<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commit Kontrolü</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e293b;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #334155;
      border-radius: 12px;
      padding: 2rem;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
    }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; color: #fbbf24; }
    ol { margin: 1rem 0; padding-left: 1.5rem; }
    li { padding: 0.5rem 0; }
    code { background: #475569; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    .footer { margin-top: 1.5rem; font-size: 0.85rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚠️ Commit öncesi kontrol</h1>
    <p>CI deploy hatası çıkmaması için sırayla çalıştırın:</p>
    <ol>
      <li><code>npm run lint:fix</code></li>
      <li><code>npm run lint</code></li>
      <li><code>npm run type-check</code></li>
      <li><code>npm run build</code></li>
    </ol>
    <p class="footer">Bu sayfa commit sırasında otomatik açılır.</p>
  </div>
</body>
</html>
